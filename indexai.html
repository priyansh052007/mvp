<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Layout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <span>Class</span>
    <span class="download">⬇</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active">Class</div>
    <div class="tab">Class Attendance</div>
  </div>

  <!-- Sub menu -->
  <div class="sub-menu">
    <span>Class</span>
    <span>Add Class</span>
    <span>Update Class</span>
    <span>Remove Class</span>
  </div>

  <!-- Scrollable Content -->
  <div class="content">
    <!-- simulate long content -->
    <div class="box"></div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active">Class</div>
    <div class="nav-item">Subject</div>
    <div class="nav-item">Student</div>
    <div class="nav-item">Teacher</div>
    <div class="nav-item">Timetable</div>
  </div>

</div>

</body>
</html>
