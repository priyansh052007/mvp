<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Layout</title>
  <link rel="stylesheet" href="styleai.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <span>Class</span>
    <span class="download">⬇</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active">Class</div>
    <div class="tab">Class Attendance</div>
  </div>

  <!-- Sub menu -->
  <div class="sub-menu">
    <span>Class</span>
    <span>Add Class</span>
    <span>Update Class</span>
    <span>Remove Class</span>
  </div>

  <!-- Scrollable Content -->
  <div class="content">
    <!-- simulate long content -->
    <div class="box"></div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    
    <svg viewBox="0 0 360 160" width="100%" xmlns="http://www.w3.org/2000/svg">
      <rect width="360" height="160" fill="#ffffff"/>
      <rect x="10" y="20" width="340" height="120" rx="30" fill="#f2f2f5"/>

      <g transform="translate(50,70)" fill="#3b6edc">
        <rect x="-12" y="-12" width="10" height="10" rx="2"/>
        <rect x="2" y="-12" width="10" height="10" rx="2"/>
        <rect x="-12" y="2" width="10" height="10" rx="2"/>
        <rect x="2" y="2" width="10" height="10" rx="2"/>
        <text x="0" y="35" text-anchor="middle" font-size="12">Class</text>
      </g>

      <g transform="translate(115,70)" stroke="#8e8e93" fill="none" stroke-width="2">
        <rect x="-10" y="-14" width="20" height="28" rx="3"/>
        <line x1="-6" y1="-6" x2="6" y2="-6"/>
        <text x="0" y="35" text-anchor="middle" font-size="12" fill="#8e8e93" stroke="none">Subject</text>
      </g>

      <g transform="translate(180,70)" stroke="#8e8e93" fill="none" stroke-width="2">
        <circle cx="0" cy="-6" r="5"/>
        <path d="M -10 10 Q 0 0 10 10"/>
        <text x="0" y="35" text-anchor="middle" font-size="12" fill="#8e8e93" stroke="none">Student</text>
      </g>

      <g transform="translate(245,70)" stroke="#8e8e93" fill="none" stroke-width="2">
        <circle cx="-5" cy="-6" r="4"/>
        <rect x="2" y="-10" width="10" height="8" rx="2"/>
        <path d="M -12 10 Q -5 2 2 10"/>
        <text x="0" y="35" text-anchor="middle" font-size="12" fill="#8e8e93" stroke="none">Teacher</text>
      </g>

      <g transform="translate(310,70)" stroke="#8e8e93" fill="none" stroke-width="2">
        <rect x="-10" y="-10" width="20" height="20" rx="3"/>
        <line x1="-10" y1="-4" x2="10" y2="-4"/>
        <line x1="-5" y1="-14" x2="-5" y2="-10"/>
        <line x1="5" y1="-14" x2="5" y2="-10"/>
        <text x="0" y="35" text-anchor="middle" font-size="12" fill="#8e8e93" stroke="none">Timetable</text>
      </g>

    </svg>
    
  </div>

</div>

</body>
</html>
