<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>School</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>

<body>

  <div class="app">

    <div class="header">
      <span>Class</span>
      <span class="material-symbols-rounded header_icon">arrow_downward_alt</span>
    </div>

    <div class="tabs">
      <span class="tab" onclick="selectOption('a')">Class</span>
      <span class="tab" onclick="selectOption('b')">Class Attendance</span>
    </div>

    <div class="todo">

      <div class="todo_icons">
        <span class="material-symbols-rounded search_icon">search</span>
        <span class="material-symbols-rounded filter_icon">tune</span>
      </div>
      <div class="todo_tabs">
        <span class="todo_tab" id="1">Class</span>
        <span class="todo_tab" id="2">Add Class</span>
        <span class="todo_tab" id="3">Update Class</span>
        <span class="todo_tab" id="4">Remove Class</span>
      </div>

    </div>

    <div class="content">
      <span>Class</span>
    </div>

    <div class="main_tabs">
      <div class="main_tab"><span class="material-symbols-rounded main_tabs_icon">cast_for_education</span>Class</div>
      <div class="main_tab"><span class="material-symbols-rounded main_tabs_icon">book</span>Subject</div>
      <div class="main_tab"><span class="material-symbols-rounded main_tabs_icon">id_card</span>Student</div>
      <div class="main_tab"><span class="material-symbols-rounded main_tabs_icon">groups_3</span>Teacher</div>
      <div class="main_tab"><span class="material-symbols-rounded main_tabs_icon">calendar_clock</span>Timetable</div>
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
