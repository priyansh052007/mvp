<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fixed Tab Example</title>
  <style>
    /* Fixed tab */
    .tab {
      position: fixed;   /* stays on screen */
      top: 0;            /* stick to top */
      left: 0;
      width: 100%;
      background-color: #333;
      color: white;
      display: flex;
      padding: 10px;
      gap: 20px;
      z-index: 1000;     /* stays above other content */
    }

    .tab a {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
    }

    .tab a:hover {
      background: #555;
      border-radius: 5px;
    }

    /* Page content */
    .content {
      margin-top: 60px; /* prevent overlap with fixed tab */
      padding: 20px;
      height: 2000px; /* just to enable scrolling */
      background: #f4f4f4;
    }
  </style>
</head>

<body>

  <div class="tab">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>

  <div class="content">
    <h2>Scroll down</h2>
    <p>This content scrolls, but the tab stays fixed at the top.</p>
  </div>

</body>
</html>
