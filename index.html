<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>School</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>

<body>

  <div class="app">

    <div class="header">
      <span>Class</span>
      <span class="material-symbols-rounded header_icon">arrow_downward_alt</span>
    </div>

    <div class="tabs">
      <span>Class</span>
      <span>Class Attendance</span>
    </div>

    <div class="todo">
      <div class="todo_ icons">
        <span class="material-symbols-rounded search_icon">search</span>
        <span class="material-symbols-rounded filter_icon">tune</span>
      </div>
      <div class="todo_tabs">
        <span>Class</span>
        <span>Add Class</span>
        <span>Update Class</span>
        <span>Remove Class</span>
      </div>
    </div>

    <div class="content">
      <span>Screen</span>
    </div>

    <div class="main_tabs">
      <div class="tab"><span class="material-symbols-rounded main_tabs_icon">cast_for_education</span>Class</div>
      <div class="tab"><span class="material-symbols-rounded main_tabs_icon">book</span>Subject</div>
      <div class="tab"><span class="material-symbols-rounded main_tabs_icon">id_card</span>Student</div>
      <div class="tab"><span class="material-symbols-rounded main_tabs_icon">groups_3</span>Teacher</div>
      <div class="tab"><span class="material-symbols-rounded main_tabs_icon">calendar_clock</span>Timetable</div>
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
