<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Bottom Nav Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="light">

  <div class="content">
    <h2>Feed Content</h2>
    <p>Scroll down... bottom nav stays fixed</p>
    <div style="height:1500px;"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">

    <button class="nav-item active">
      <!-- Home -->
      <svg viewBox="0 0 24 24">
        <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/>
      </svg>
    </button>

    <button class="nav-item">
      <!-- Search -->
      <svg viewBox="0 0 24 24">
        <path d="M10 2a8 8 0 105.3 14l4.7 4.7 1.4-1.4-4.7-4.7A8 8 0 0010 2z"/>
      </svg>
    </button>

    <button class="nav-item plus">
      <!-- Create -->
      <svg viewBox="0 0 24 24">
        <path d="M11 5h2v14h-2zM5 11h14v2H5z"/>
      </svg>
    </button>

    <button class="nav-item">
      <!-- Reels -->
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16v10H4zM9 7l6 5-6 5z"/>
      </svg>
    </button>

    <!-- Profile -->
    <button class="nav-item profile">
      <img src="https://i.pravatar.cc/100?img=12" alt="profile">
    </button>

  </nav>

  <script>
    // Active tab switching
    const items = document.querySelectorAll(".nav-item");

    items.forEach(item => {
      item.addEventListener("click", () => {
        items.forEach(i => i.classList.remove("active"));
        item.classList.add("active");
      });
    });

    // Dark mode toggle (optional demo)
    document.body.addEventListener("dblclick", () => {
      document.body.classList.toggle("dark");
    });
  </script>

</body>
</html>
